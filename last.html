<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forever Holi Wish</title>
  <link rel="stylesheet" href="last.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Holi Animation Canvas -->
  <canvas id="holiCanvas"></canvas>

  <h1>🌸 Happy Holi My Anjali 🌸</h1>

  <p class="final-wish">
    This Holi is not just about colors,<br>
    it’s about feelings, smiles, and us 💖<br>
    May every color bring us closer forever 🌈
  </p>

  <!-- Auto Scrolling Gallery -->
  <div class="scroll-wrapper">
    <div class="scroll-track">
      <img src="/image1.jpg">
      <img src="/image2.jpg">
      <img src="/image3.jpg">
      <img src="/image4.jpg">
      <img src="/image5.jpg">
      <img src="/image6.jpg">

      <!-- repeat for smooth loop -->
      <img src="/image1.jpg">
      <img src="/image2.jpg">
      <img src="/image3.jpg">
      <img src="/image4.jpg">
      <img src="/image5.jpg">
      <img src="/image6.jpg">
    </div>
  </div>

  <!-- Next Button -->
<button style="
  display:block;
  margin:20px auto;
  padding:12px 24px;
  background-color:#ff69b4;
  color:white;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
  box-shadow:0 4px 6px rgba(0,0,0,0.2);
  transition:transform 0.2s ease;
"
onclick="window.location.href='anjali.html'"
onmouseover="this.style.transform='scale(1.1)'"
onmouseout="this.style.transform='scale(1)'">
  ➡️ Next
</button>
  <p class="ending">
    With all my heart & colors 💕<br>
    Made with ❤️ by Mohit
  </p>

  <script src="final-holi.js"></script>
</body>
</html>
